<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamento - Marcos Aparecido</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/imask"></script>
</head>
<body>
    <div class="container compact">
        <header class="mini-header">
            <h2>MARCOS APARECIDO RODRIGUES</h2>
            <p>Avenida XV de Novembro, 1565 - São Carlos do Ivaí - PR</p>
            <p>Bairro: Conjunto Bela Vista - Fone: (44) 99723-1252</p>
        </header>

        <div class="form-row">
            <div class="input-group flex-2">
                <label>Cliente</label>
                <input type="text" id="nomeCliente" placeholder="Nome do cliente">
            </div>
            <div class="input-group flex-1">
                <label>Cidade (PR)</label>
                <select id="cidade" style="width: 100%"></select>
            </div>
        </div>

        <section class="items-section">
            <div class="section-header">
                <span>Itens do Orçamento</span>
                <button class="btn-sm" onclick="adicionarLinha()">+ Adicionar Item</button>
            </div>
            <div class="table-wrapper">
                <table id="tabelaItens">
                    <thead>
                        <tr>
                            <th style="width: 60%">PRODUTO</th>
                            <th style="width: 15%">QTDE</th>
                            <th style="width: 25%">VALOR</th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </div>
        </section>

        <div class="bottom-grid">
            <div class="input-group">
                <label>Método de Pagamento</label>
                <select id="metodoPagamento">
                    <option value="PIX">PIX</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão de Crédito">Cartão de Crédito</option>
                    <option value="Cartão de Débito">Cartão de Débito</option>
                </select>
            </div>
            <div class="finances-row">
                <input type="text" id="frete" class="money-sm" placeholder="Frete (+)" onblur="calcularTotal()">
                <input type="text" id="desconto" class="money-sm" placeholder="Desconto (-)" onblur="calcularTotal()">
            </div>
        </div>

        <footer class="action-bar">
            <div class="total-label">Total: <span id="totalDisplay">R$ 0,00</span></div>
            <button class="btn-main" onclick="gerarPDF()">Gerar Orçamento PDF</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
