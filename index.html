<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Orçamento - Marcos Aparecido</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/imask"></script>
</head>
<body>
    <div class="main-wrapper">
        <div class="container">
            <header class="header-info">
                <h2>MARCOS APARECIDO RODRIGUES</h2> [cite: 8]
                <p>Avenida XV de Novembro, 1565 - São Carlos do Ivaí - PR [cite: 9]</p>
                <p>Bairro: Conjunto Bela Vista - Fone: (44) 99723-1252 [cite: 10, 11]</p>
            </header>

            <div class="form-grid">
                <div class="input-box">
                    <label>Cliente</label>
                    <input type="text" id="nomeCliente" placeholder="Nome do cliente">
                </div>
                <div class="input-box">
                    <label>Cidade (PR)</label>
                    <select id="cidade" style="width: 100%"></select>
                </div>
            </div>

            <section class="items-area">
                <div class="items-header">
                    <span>Itens do Orçamento</span>
                    <button class="btn-add" onclick="adicionarLinha()">+ Adicionar Item</button>
                </div>
                <table id="tabelaItens">
                    <thead>
                        <tr>
                            <th style="width: 50%">PRODUTO</th>
                            <th style="width: 15%">QTDE</th>
                            <th style="width: 25%">VALOR</th>
                            <th style="width: 10%"></th>
                        </tr>
                    </thead>
                    <tbody id="corpoTabela"></tbody>
                </table>
            </section>

            <div class="footer-grid">
                <div class="payment-selection">
                    <label>Pagamento</label>
                    <select id="metodoPagamento"> [cite: 18]
                        <option value="PIX">PIX</option>
                        <option value="Dinheiro">Dinheiro</option>
                        <option value="Cartão de Crédito">Cartão de Crédito</option>
                        <option value="Cartão de Débito">Cartão de Débito</option>
                    </select>
                </div>
                <div class="extra-fields">
                    <input type="text" id="frete" class="money-input" placeholder="Frete (+)" onblur="calcularTotal()"> [cite: 23]
                    <input type="text" id="desconto" class="money-input" placeholder="Desconto (-)" onblur="calcularTotal()"> [cite: 22]
                </div>
            </div>

            <div class="action-footer">
                <div class="total-text">Total: <span id="totalDisplay">R$ 0,00</span></div> [cite: 24]
                <button class="btn-submit" onclick="gerarPDF()">Gerar Orçamento PDF</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
